<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaWeather - Weather App</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Left Section: Interactive Map -->
        <div class="section map-section">
            <div id="map"></div>
        </div>

        <!-- Center Section: Weather Display -->
        <div class="section weather-section">
            <div class="weather-card">
                <div class="weather-header">
                    <h1>Weather Details</h1>
                </div>
                <div class="weather-content">
                    <div class="temperature-display">
                        <span class="temp-value">--°C</span>
                    </div>
                    <div class="weather-info">
                        <p><strong>City:</strong> <span id="city-name">Select a city</span></p>
                        <p><strong>Condition:</strong> <span id="weather-condition">--</span></p>
                        <p><strong>Humidity:</strong> <span id="humidity">--%</span></p>
                        <p><strong>Wind Speed:</strong> <span id="wind-speed">-- km/h</span></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Section: Coastal Regions -->
        <div class="section cities-section">
            <div class="cities-panel">
                <h2>Coastal Regions</h2>
                <div class="regions-list">
                    <p>Loading regions...</p>
                </div>
                <div class="region-info">
                    <p><strong>Zone:</strong> <span id="zone-type">South Coast</span></p>
                    <p><strong>Activities:</strong> <span id="region-activities">--</span></p>
                    <p class="region-description"><span id="region-description">--</span></p>
                </div>
                <p class="credits">
                    <small>Weather data provided by WeatherAPI and Open-Meteo</small>
                </p>
                <p class="credits">
                    <small>ML Safety Analysis for Coastal Adventures</small>
                </p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
